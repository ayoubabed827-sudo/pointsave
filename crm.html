<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PointSave CRM">
<meta name="theme-color" content="#00875A">
<meta name="robots" content="noindex,nofollow">
<title>PointSave CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#00875A;--g2:#00C77A;--g3:#004D33;
  --y:#FFD700;--or:#FF9500;--re:#FF4444;--bl:#4A9EFF;
  --bg:#07100D;--bg2:#0D1F18;--bg3:#142B20;
  --tx:#E8F5F0;--mu:#5A8A72;--bo:rgba(0,199,122,.15);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#login.gone{display:none!important}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo-txt{font-size:24px;font-weight:800;color:#fff}
.logo-txt span{color:var(--g2)}
.login-sub{font-size:13px;color:var(--mu);margin-bottom:32px}
.lbox{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--bo);border-radius:16px;padding:24px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:5px}
.lf input{width:100%;padding:13px 14px;background:var(--bg3);border:1.5px solid var(--bo);border-radius:10px;color:var(--tx);font-size:16px;outline:none;-webkit-appearance:none}
.lf input:focus{border-color:var(--g2)}
.lbtn{width:100%;padding:14px;background:var(--g);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px}
.lerr{display:none;color:#FF6B6B;font-size:12px;text-align:center;margin-top:10px}
.lerr.on{display:block}
.lreset{display:block;width:100%;background:none;border:none;color:var(--mu);font-size:11px;cursor:pointer;margin-top:14px;text-decoration:underline;text-align:center}

/* ===== APP ===== */
#app{display:none;flex-direction:column;height:100%}
#app.on{display:flex}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bo);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.tb-logo{font-size:16px;font-weight:800;color:#fff}
.tb-logo span{color:var(--g2)}
.tb-urg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,68,68,.15);color:#FF6B6B;border:1px solid rgba(255,68,68,.2);margin-left:8px}
.tb-urg.ok{background:rgba(0,199,122,.1);color:var(--g2);border-color:rgba(0,199,122,.2)}
.tb-right{display:flex;gap:8px;align-items:center}
.tb-btn{width:34px;height:34px;border-radius:9px;background:var(--bg3);border:1px solid var(--bo);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;position:relative}
.tb-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--re);border:2px solid var(--bg2);display:none}
.tb-dot.on{display:block}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(68px + env(safe-area-inset-bottom))}
.panel{display:none;padding:14px}
.panel.on{display:block}

/* ===== BOTTOM NAV ===== */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bo);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;cursor:pointer;background:none;border:none;color:var(--mu);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;position:relative}
.bn.on{color:var(--g2)}
.bn-ico{font-size:20px}
.bn-dot{position:absolute;top:7px;right:calc(50% - 14px);width:6px;height:6px;border-radius:50%;background:var(--re);border:1.5px solid var(--bg2);display:none}
.bn-dot.on{display:block}

/* ===== KPI ===== */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--bo);border-radius:13px;padding:13px;border-top:2px solid var(--kc,var(--g))}
.kpi-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:3px}
.kpi-v{font-size:26px;font-weight:800;color:#fff;line-height:1}
.kpi-s{font-size:11px;color:var(--mu);margin-top:2px}

/* ===== SECTION ===== */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh h3{font-size:14px;font-weight:700;color:#fff}
.sh-btn{font-size:11px;font-weight:600;color:var(--g2);background:rgba(0,199,122,.08);border:1px solid rgba(0,199,122,.18);padding:4px 10px;border-radius:7px;cursor:pointer;border-style:solid}

/* ===== TIMELINE ===== */
.tl{display:flex;align-items:flex-end;gap:5px;height:56px;margin-bottom:18px}
.tlc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.tlb{width:100%;background:rgba(0,199,122,.2);border-radius:3px 3px 0 0;min-height:3px}
.tll{font-size:9px;color:var(--mu)}

/* ===== LEAD CARD ===== */
.lcard{background:var(--bg2);border:1px solid var(--bo);border-radius:13px;padding:13px;margin-bottom:9px}
.lcard.urg{border-left:3px solid var(--re)}
.lcard.enc{border-left:3px solid var(--bl)}
.lcard.ins{border-left:3px solid var(--g2)}
.lc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.lc-name{font-size:15px;font-weight:700;color:#fff}
.lc-date{font-size:10px;color:var(--mu)}
.lc-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.lc-ville{font-size:12px;color:var(--mu)}
.lc-tel{font-size:12px;color:var(--g2);font-weight:600;text-decoration:none}
.lc-src{font-size:10px;color:var(--mu);background:rgba(0,135,90,.08);border:1px solid rgba(0,199,122,.1);padding:2px 6px;border-radius:5px}
.lc-note{font-size:11px;color:var(--mu);margin-top:4px;margin-bottom:2px}
.note-i{width:100%;background:none;border:none;border-bottom:1px dashed rgba(0,199,122,.2);color:var(--mu);font-size:11px;padding:3px 0;outline:none;margin-top:5px}
.note-i:focus{border-color:var(--g2);color:var(--tx)}
.note-i::placeholder{color:rgba(90,138,114,.35)}
.lc-acts{display:flex;gap:7px;margin-top:10px}
.act{flex:1;padding:9px;border-radius:9px;font-size:12px;font-weight:600;border:none;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
.act-call{background:rgba(0,199,122,.1);color:var(--g2);border:1px solid rgba(0,199,122,.2)!important}
.act-stat{background:rgba(255,255,255,.05);color:var(--tx);border:1px solid var(--bo)!important}
.act-ok{background:rgba(0,199,122,.1);color:var(--g2);border:1px solid rgba(0,199,122,.2)!important}

/* ===== BADGE ===== */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:20px}
.bn-n{background:rgba(255,215,0,.1);color:var(--y);border:1px solid rgba(255,215,0,.2)}
.bn-c{background:rgba(74,158,255,.1);color:var(--bl);border:1px solid rgba(74,158,255,.2)}
.bn-i{background:rgba(0,199,122,.1);color:var(--g2);border:1px solid rgba(0,199,122,.2)}
.bn-nj{background:rgba(255,149,0,.1);color:var(--or);border:1px solid rgba(255,149,0,.2)}
.bn-ni{background:rgba(255,68,68,.08);color:#FF6B6B;border:1px solid rgba(255,68,68,.15)}

/* ===== SEARCH & FILTERS ===== */
.srch{position:relative;margin-bottom:12px}
.srch input{width:100%;padding:11px 12px 11px 36px;background:var(--bg2);border:1.5px solid var(--bo);border-radius:11px;color:var(--tx);font-size:14px;outline:none;-webkit-appearance:none}
.srch input:focus{border-color:var(--g2)}
.srch input::placeholder{color:var(--mu)}
.srch::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--bo);background:none;color:var(--mu);cursor:pointer;white-space:nowrap;-webkit-appearance:none}
.pill.on{background:rgba(0,199,122,.1);border-color:rgba(0,199,122,.3);color:var(--g2)}

/* ===== MODAL ===== */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mov.on{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--bo);border-radius:18px 18px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));width:100%;animation:sup .25s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:34px;height:3px;border-radius:2px;background:rgba(255,255,255,.12);margin:0 auto 14px}
.mtit{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px}
.msub{font-size:12px;color:var(--mu);margin-bottom:14px}
.mopts{display:flex;flex-direction:column;gap:7px}
.mopt{padding:12px 14px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid transparent;text-align:left;-webkit-appearance:none}
.mopt-n{background:rgba(255,215,0,.07);color:var(--y);border-color:rgba(255,215,0,.18)}
.mopt-c{background:rgba(74,158,255,.07);color:var(--bl);border-color:rgba(74,158,255,.18)}
.mopt-i{background:rgba(0,199,122,.07);color:var(--g2);border-color:rgba(0,199,122,.18)}
.mopt-nj{background:rgba(255,149,0,.07);color:var(--or);border-color:rgba(255,149,0,.18)}
.mopt-ni{background:rgba(255,68,68,.07);color:#FF6B6B;border-color:rgba(255,68,68,.18)}
.mcancel{width:100%;margin-top:8px;background:rgba(255,255,255,.04);border:1px solid var(--bo);color:var(--mu);font-size:13px;font-weight:600;padding:12px;border-radius:11px;cursor:pointer;-webkit-appearance:none}

/* ===== STATS ===== */
.scard{background:var(--bg2);border:1px solid var(--bo);border-radius:13px;padding:14px;margin-bottom:11px}
.stit{font-size:13px;font-weight:700;color:#fff;margin-bottom:12px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.blbl{font-size:11px;color:var(--mu);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrk{flex:1;height:6px;background:rgba(0,135,90,.1);border-radius:3px;overflow:hidden}
.bfil{height:100%;background:linear-gradient(90deg,var(--g),var(--g2));border-radius:3px}
.bval{font-size:11px;color:var(--tx);font-weight:600;width:22px;text-align:right}
.dw{display:flex;align-items:center;gap:12px}
.dleg{flex:1;display:flex;flex-direction:column;gap:6px}
.drow{display:flex;align-items:center;justify-content:space-between;font-size:11px}
.dlft{display:flex;align-items:center;gap:6px;color:var(--mu)}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dval{font-weight:600;color:var(--tx)}

/* ===== SETTINGS ===== */
.sset{background:var(--bg2);border:1px solid var(--bo);border-radius:13px;padding:14px;margin-bottom:11px}
.ssettit{font-size:13px;font-weight:700;color:#fff;margin-bottom:13px}
.sf2{margin-bottom:12px}
.sf2 label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:5px}
.sf2 input{width:100%;padding:11px 12px;background:var(--bg3);border:1.5px solid var(--bo);border-radius:9px;color:var(--tx);font-size:14px;outline:none;-webkit-appearance:none}
.sf2 input:focus{border-color:var(--g2)}
.sbtn{width:100%;padding:12px;background:var(--g);border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px}
.sbtn.sec{background:rgba(0,199,122,.08);color:var(--g2);border:1px solid rgba(0,199,122,.2)!important}
.sbtn.grey{background:rgba(255,255,255,.05);color:var(--tx);border:1px solid var(--bo)!important}
.sbtn.red{background:none;color:#FF6B6B;text-decoration:underline;border:none!important}

/* ===== NOTIF BANNER ===== */
.nbanner{background:rgba(0,135,90,.1);border:1px solid rgba(0,199,122,.2);border-radius:12px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.nbanner-body{flex:1}
.nbanner-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:2px}
.nbanner-sub{font-size:11px;color:var(--mu)}
.nbanner-btn{background:var(--g);border:none;color:#fff;font-size:11px;font-weight:700;padding:6px 11px;border-radius:7px;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* ===== TOAST ===== */
.toast{position:fixed;top:max(60px,calc(env(safe-area-inset-top) + 60px));left:50%;transform:translateX(-50%) translateY(-60px);opacity:0;background:var(--bg3);border:1px solid rgba(0,199,122,.3);color:var(--g2);font-size:13px;font-weight:600;padding:9px 16px;border-radius:9px;z-index:999;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:36px 20px;color:var(--mu)}
.empty-ico{font-size:32px;margin-bottom:8px}
.empty-txt{font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="logo">
    <svg width="34" height="34" viewBox="0 0 38 38" fill="none">
      <path d="M19 2L4 8V20C4 28.5 10.8 35.4 19 37C27.2 35.4 34 28.5 34 20V8L19 2Z" fill="#0A1A14" stroke="#00875A" stroke-width="1.5"/>
      <circle cx="12" cy="18" r="3" fill="#00C77A"/>
      <circle cx="19" cy="14" r="3" fill="#FFD700"/>
      <circle cx="26" cy="18" r="3" fill="white"/>
    </svg>
    <div class="logo-txt">Point<span>Save</span></div>
  </div>
  <div class="login-sub">CRM — Accès privé</div>
  <div class="lbox">
    <div class="lf">
      <label>Identifiant</label>
      <input type="text" id="lu" placeholder="admin" autocomplete="username">
    </div>
    <div class="lf">
      <label>Mot de passe</label>
      <input type="password" id="lp" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="lbtn" id="lbtn" onclick="doLogin()">Se connecter</button>
    <div class="lerr" id="lerr">Identifiant ou mot de passe incorrect</div>
  </div>
  <button class="lreset" onclick="resetCache()">Réinitialiser le cache</button>
</div>

<!-- MODAL STATUT -->
<div class="mov" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <div class="mhandle"></div>
    <div class="mtit">Changer le statut</div>
    <div class="msub" id="msub"></div>
    <div class="mopts">
      <button class="mopt mopt-n" onclick="setStatut('Nouveau')">🟡 Nouveau — à rappeler</button>
      <button class="mopt mopt-c" onclick="setStatut('Contacte')">📞 Contacté — en attente</button>
      <button class="mopt mopt-i" onclick="setStatut('Inscrit au stage')">✅ Inscrit au stage</button>
      <button class="mopt mopt-nj" onclick="setStatut('Non joignable')">📵 Non joignable</button>
      <button class="mopt mopt-ni" onclick="setStatut('Non interesse')">❌ Non intéressé</button>
    </div>
    <button class="mcancel" onclick="closeModal()">Annuler</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- APP -->
<div id="app">

  <div class="topbar">
    <div style="display:flex;align-items:center">
      <div class="tb-logo">Point<span>Save</span></div>
      <div class="tb-urg" id="tb-urg">0 urgent</div>
    </div>
    <div class="tb-right">
      <div class="tb-btn" onclick="goPanel('notifs')">🔔<div class="tb-dot" id="tb-dot"></div></div>
      <div class="tb-btn" onclick="goPanel('settings')" id="tb-av">A</div>
    </div>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div class="panel on" id="p-dashboard">
      <div id="nb-el"></div>
      <div class="kgrid" id="kgrid"></div>
      <div class="sh"><h3>📈 7 derniers jours</h3></div>
      <div class="tl" id="tl"></div>
      <div class="sh"><h3>🔴 À rappeler</h3><button class="sh-btn" onclick="goPanel('leads')">Tous →</button></div>
      <div id="urg-list"></div>
    </div>

    <!-- LEADS -->
    <div class="panel" id="p-leads">
      <div class="srch"><input type="search" id="srch" placeholder="Rechercher..." oninput="renderLeads()"></div>
      <div class="pills" id="pills">
        <button class="pill on" onclick="setF(this,'')">Tous</button>
        <button class="pill" onclick="setF(this,'Nouveau')">🟡 Nouveaux</button>
        <button class="pill" onclick="setF(this,'Contacte')">📞 Contactés</button>
        <button class="pill" onclick="setF(this,'Inscrit au stage')">✅ Inscrits</button>
        <button class="pill" onclick="setF(this,'Non joignable')">📵 NJ</button>
        <button class="pill" onclick="setF(this,'Non interesse')">❌ NI</button>
      </div>
      <div id="leads-list"></div>
    </div>

    <!-- STATS -->
    <div class="panel" id="p-stats">
      <div class="kgrid" id="kgrid2"></div>
      <div class="scard">
        <div class="stit">🏆 Par statut</div>
        <div class="dw"><canvas id="donut" width="88" height="88"></canvas><div class="dleg" id="dleg"></div></div>
      </div>
      <div class="scard">
        <div class="stit">📍 Top villes</div>
        <div id="vbars"></div>
      </div>
    </div>

    <!-- NOTIFS -->
    <div class="panel" id="p-notifs">
      <div class="sh"><h3>🔔 Notifications</h3><button class="sh-btn" onclick="clearNotifs()">Tout lire</button></div>
      <div id="notifs-list"></div>
    </div>

    <!-- SETTINGS -->
    <div class="panel" id="p-settings">
      <div class="sset">
        <div class="ssettit">👤 Mon compte</div>
        <div class="sf2"><label>Identifiant</label><input id="s-user" placeholder="admin"></div>
        <div class="sf2"><label>Nouveau mot de passe</label><input type="password" id="s-pass" placeholder="Laisser vide = inchangé"></div>
        <button class="sbtn" onclick="saveSettings()">Enregistrer</button>
      </div>
      <div class="sset">
        <div class="ssettit">📊 Données</div>
        <button class="sbtn sec" onclick="exportCSV()">⬇️ Exporter CSV</button>
        <button class="sbtn sec" onclick="exportJSON()">⬇️ Sauvegarder JSON</button>
        <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(this)">
        <button class="sbtn grey" onclick="document.getElementById('imp').click()">⬆️ Importer JSON</button>
      </div>
      <div style="text-align:center;padding:8px 0 20px">
        <button class="sbtn red" onclick="doLogout()">Se déconnecter</button>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <button class="bn on" id="bn-dashboard" onclick="goPanel('dashboard')">
      <div class="bn-ico">🏠</div>Dashboard
    </button>
    <button class="bn" id="bn-leads" onclick="goPanel('leads')">
      <div class="bn-ico">👥</div>Leads
      <div class="bn-dot" id="bn-dot"></div>
    </button>
    <button class="bn" id="bn-stats" onclick="goPanel('stats')">
      <div class="bn-ico">📊</div>Stats
    </button>
    <button class="bn" id="bn-settings" onclick="goPanel('settings')">
      <div class="bn-ico">⚙️</div>Réglages
    </button>
  </div>

</div>

<script>
// ===== CONFIG =====
var USER = 'admin';
var PASS = 'pointsave2025';
var leads = [];
var curIdx = null;
var activeF = '';

// ===== AUTH =====
function doLogin() {
  USER = localStorage.getItem('crm_user') || 'admin';
  PASS = localStorage.getItem('crm_pass') || 'pointsave2025';
  var u = document.getElementById('lu').value.trim();
  var p = document.getElementById('lp').value.trim();
  if (u === USER && p === PASS) {
    sessionStorage.setItem('ok', '1');
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    init();
  } else {
    document.getElementById('lerr').classList.add('on');
    document.getElementById('lp').value = '';
  }
}

document.getElementById('lp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('lu').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('lp').focus();
});

function doLogout() {
  sessionStorage.removeItem('ok');
  location.reload();
}

function resetCache() {
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
}

// Auto-login si session active
if (sessionStorage.getItem('ok') === '1') {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  setTimeout(init, 10);
}

// ===== INIT =====
function init() {
  var s = localStorage.getItem('ps_leads');
  leads = s ? JSON.parse(s) : demoData();
  loadSettings();
  renderAll();
  checkNotifPerm();
  startPoll();
}

function saveLeads() {
  localStorage.setItem('ps_leads', JSON.stringify(leads));
}

function loadSettings() {
  document.getElementById('s-user').value = localStorage.getItem('crm_user') || 'admin';
  var u = localStorage.getItem('crm_user') || 'admin';
  document.getElementById('tb-av').textContent = u.charAt(0).toUpperCase();
}

function saveSettings() {
  var u = document.getElementById('s-user').value.trim();
  var p = document.getElementById('s-pass').value.trim();
  if (u) { localStorage.setItem('crm_user', u); USER = u; }
  if (p) { localStorage.setItem('crm_pass', p); PASS = p; }
  loadSettings();
  toast('Sauvegardé ✓');
}

// ===== RENDER =====
function renderAll() {
  renderKPIs();
  renderTimeline();
  renderUrgents();
  renderLeads();
  renderStats();
  renderNotifs();
  updateDots();
}

function renderKPIs() {
  var t = leads.length;
  var nv = leads.filter(function(l){return l.statut==='Nouveau';}).length;
  var nj = leads.filter(function(l){return l.statut==='Non joignable';}).length;
  var ins = leads.filter(function(l){return l.statut==='Inscrit au stage';}).length;
  var tx = t > 0 ? Math.round(ins/t*100) : 0;
  var now = new Date();
  var mo = leads.filter(function(l){var d=pdate(l.date);return d&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  var kpis = [
    {l:'Total',v:t,s:'leads',c:'#00C77A'},
    {l:'Ce mois',v:mo,s:mname(now.getMonth()),c:'#FFD700'},
    {l:'Urgents',v:nv+nj,s:nv+' nv · '+nj+' NJ',c:'#FF9500'},
    {l:'Conversion',v:tx+'%',s:ins+' inscrits',c:'#00C77A'}
  ];
  var h = kpis.map(function(k){
    return '<div class="kpi" style="--kc:'+k.c+'"><div class="kpi-l">'+k.l+'</div><div class="kpi-v">'+k.v+'</div><div class="kpi-s">'+k.s+'</div></div>';
  }).join('');
  document.getElementById('kgrid').innerHTML = h;
  document.getElementById('kgrid2').innerHTML = h;
  var urg = nv + nj;
  var el = document.getElementById('tb-urg');
  el.textContent = urg + ' urgent' + (urg>1?'s':'');
  el.className = 'tb-urg' + (urg>0?'':' ok');
}

function renderTimeline() {
  var now = new Date(), days = [];
  for (var i = 6; i >= 0; i--) {
    var d = new Date(now); d.setDate(d.getDate()-i);
    var c = leads.filter(function(l){var ld=pdate(l.date);return ld&&ld.getDate()===d.getDate()&&ld.getMonth()===d.getMonth();}).length;
    days.push({c:c, l:d.getDate()+'/'+(d.getMonth()+1)});
  }
  var mx = Math.max.apply(null,days.map(function(d){return d.c;})) || 1;
  document.getElementById('tl').innerHTML = days.map(function(d){
    var h = Math.max(3,Math.round(d.c/mx*48));
    return '<div class="tlc"><div class="tlb" style="height:'+h+'px"></div><div class="tll">'+d.l+'</div></div>';
  }).join('');
}

function renderUrgents() {
  var urg = leads.filter(function(l){return l.statut==='Nouveau'||l.statut==='Non joignable';}).slice(0,3);
  document.getElementById('urg-list').innerHTML = urg.length
    ? urg.map(function(l){return makeCard(l,leads.indexOf(l));}).join('')
    : '<div class="empty"><div class="empty-ico">🎉</div><div class="empty-txt">Aucun rappel urgent !</div></div>';
}

function renderLeads() {
  var q = ((document.getElementById('srch')||{}).value||'').toLowerCase();
  var f = leads.filter(function(l){
    var mf = !activeF || l.statut===activeF;
    var mq = !q || (l.prenom+' '+l.nom+' '+l.ville+' '+l.telephone).toLowerCase().indexOf(q)>=0;
    return mf && mq;
  });
  document.getElementById('leads-list').innerHTML = f.length
    ? f.map(function(l){return makeCard(l,leads.indexOf(l));}).join('')
    : '<div class="empty"><div class="empty-ico">🔍</div><div class="empty-txt">Aucun résultat</div></div>';
}

function makeCard(l, idx) {
  var bcls = {
    'Nouveau':'bn-n urg','Contacte':'bn-c enc',
    'Inscrit au stage':'bn-i ins','Non joignable':'bn-nj urg','Non interesse':'bn-ni'
  };
  var bico = {'Nouveau':'🟡','Contacte':'📞','Inscrit au stage':'✅','Non joignable':'📵','Non interesse':'❌'};
  var parts = (bcls[l.statut]||'bn-n').split(' ');
  var bdg = parts[0];
  var ccls = parts[1]||'';
  return '<div class="lcard '+ccls+'">'
    +'<div class="lc-top"><div class="lc-name">'+l.prenom+' '+l.nom+'</div><div class="lc-date">'+l.date.split(' ')[0]+'</div></div>'
    +'<div class="lc-row"><span class="lc-ville">📍 '+l.ville+'</span><a href="tel:'+l.telephone.replace(/\s/g,'').replace(/\./g,'')+'" class="lc-tel">'+l.telephone+'</a></div>'
    +'<div class="lc-row"><span class="badge '+bdg+'">'+bico[l.statut]+' '+l.statut+'</span><span class="lc-src">'+l.source+'</span></div>'
    +(l.note?'<div class="lc-note">💬 '+l.note+'</div>':'')
    +'<input class="note-i" placeholder="Note..." value="'+esc(l.note||'')+'" onchange="saveNote('+idx+',this.value)">'
    +'<div class="lc-acts">'
    +'<a href="tel:'+l.telephone.replace(/\s/g,'').replace(/\./g,'')+'" class="act act-call">📞 Appeler</a>'
    +'<button class="act act-stat" onclick="openModal('+idx+')">Statut</button>'
    +(l.statut==='Nouveau'||l.statut==='Non joignable'?'<button class="act act-ok" onclick="qs('+idx+',-Contacte-)">📞 OK</button>'.replace(/-/g,"'"):'')
    +(l.statut==='Contacte'?'<button class="act act-ok" onclick="qs('+idx+',-Inscrit au stage-)">✅</button>'.replace(/-/g,"'"):'')
    +'</div></div>';
}

function renderStats() {
  var sts=['Nouveau','Contacte','Inscrit au stage','Non joignable','Non interesse'];
  var cols=['#FFD700','#4A9EFF','#00C77A','#FF9500','#FF6B6B'];
  var tot = leads.length||1;
  var cts = sts.map(function(s){return leads.filter(function(l){return l.statut===s;}).length;});
  var cv = document.getElementById('donut');
  if (cv) {
    var ctx = cv.getContext('2d');
    ctx.clearRect(0,0,88,88);
    var st = -Math.PI/2;
    cts.forEach(function(c,i){
      if(!c) return;
      var sl = c/tot*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(44,44); ctx.arc(44,44,40,st,st+sl); ctx.closePath();
      ctx.fillStyle=cols[i]; ctx.fill(); st+=sl;
    });
    ctx.beginPath(); ctx.arc(44,44,24,0,Math.PI*2); ctx.fillStyle='#0D1F18'; ctx.fill();
  }
  document.getElementById('dleg').innerHTML = sts.map(function(s,i){
    var p = Math.round(cts[i]/tot*100);
    return '<div class="drow"><div class="dlft"><div class="ddot" style="background:'+cols[i]+'"></div>'+s+'</div><div class="dval">'+cts[i]+' ('+p+'%)</div></div>';
  }).join('');
  var vc={};
  leads.forEach(function(l){vc[l.ville]=(vc[l.ville]||0)+1;});
  var vs=Object.keys(vc).sort(function(a,b){return vc[b]-vc[a];}).slice(0,6);
  var vm=vs.length?vc[vs[0]]:1;
  document.getElementById('vbars').innerHTML = vs.map(function(v){
    return '<div class="brow"><div class="blbl">'+v+'</div><div class="btrk"><div class="bfil" style="width:'+Math.round(vc[v]/vm*100)+'%"></div></div><div class="bval">'+vc[v]+'</div></div>';
  }).join('');
}

function renderNotifs() {
  var ns = JSON.parse(localStorage.getItem('ps_notifs')||'[]');
  document.getElementById('notifs-list').innerHTML = ns.length
    ? ns.map(function(n){
        return '<div style="background:var(--bg2);border:1px solid var(--bo);border-radius:12px;padding:12px 13px;margin-bottom:8px'+(n.read?'':';border-color:rgba(0,199,122,.25)')+'">'
          +'<div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:2px">👤 Nouveau lead — '+n.prenom+' '+n.nom+'</div>'
          +'<div style="font-size:11px;color:var(--mu)">'+n.ville+' · '+n.telephone+'</div>'
          +'<div style="font-size:10px;color:var(--mu);margin-top:3px">'+n.date+'</div>'
          +'</div>';
      }).join('')
    : '<div class="empty"><div class="empty-ico">🔔</div><div class="empty-txt">Aucune notification</div></div>';
}

function clearNotifs() {
  var ns=JSON.parse(localStorage.getItem('ps_notifs')||'[]');
  ns.forEach(function(n){n.read=true;});
  localStorage.setItem('ps_notifs',JSON.stringify(ns));
  updateDots(); renderNotifs();
}

function updateDots() {
  var nv=leads.filter(function(l){return l.statut==='Nouveau'||l.statut==='Non joignable';}).length;
  var unread=(JSON.parse(localStorage.getItem('ps_notifs')||'[]')).filter(function(n){return !n.read;}).length;
  document.getElementById('bn-dot').classList.toggle('on',nv>0);
  document.getElementById('tb-dot').classList.toggle('on',unread>0);
}

// ===== NOTIFICATIONS =====
function checkNotifPerm() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('nb-el').innerHTML =
      '<div class="nbanner"><div style="font-size:22px">🔔</div>'
      +'<div class="nbanner-body"><div class="nbanner-title">Activer les notifications</div>'
      +'<div class="nbanner-sub">Alerte dès qu\'un lead arrive</div></div>'
      +'<button class="nbanner-btn" onclick="askNotif()">Activer</button></div>';
  }
}

function askNotif() {
  Notification.requestPermission().then(function(p){
    if(p==='granted'){
      document.getElementById('nb-el').innerHTML='';
      toast('Notifications activées !');
    }
  });
}

function pushNotif(lead) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    new Notification('🔴 Nouveau lead PointSave !', {
      body: lead.prenom+' '+lead.nom+' — '+lead.ville+'\n'+lead.telephone,
      tag: 'lead-'+lead.id,
      requireInteraction: true
    });
  } catch(e) {}
}

// ===== POLLING =====
var lastCount = 0;
function startPoll() {
  lastCount = leads.length;
  setInterval(function(){
    var s = JSON.parse(localStorage.getItem('ps_leads')||'[]');
    if (s.length > lastCount) {
      var newLeads = s.slice(0, s.length-lastCount);
      newLeads.forEach(function(l){
        pushNotif(l);
        var ns=JSON.parse(localStorage.getItem('ps_notifs')||'[]');
        ns.unshift({id:l.id,prenom:l.prenom,nom:l.nom,ville:l.ville,telephone:l.telephone,date:l.date,read:false});
        localStorage.setItem('ps_notifs',JSON.stringify(ns.slice(0,50)));
      });
      leads = s; lastCount = s.length;
      renderAll(); toast('Nouveau lead reçu !');
    }
  }, 15000);
}

// ===== ACTIONS =====
function openModal(idx) {
  curIdx = idx;
  var l = leads[idx];
  document.getElementById('msub').textContent = l.prenom+' '+l.nom+' · '+l.ville;
  document.getElementById('modal').classList.add('on');
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
  curIdx = null;
}
function setStatut(s) {
  if (curIdx === null) return;
  leads[curIdx].statut = s;
  saveLeads(); renderAll(); closeModal();
  toast('Statut mis à jour');
}
function qs(idx, s) {
  leads[idx].statut = s;
  saveLeads(); renderAll();
  toast('Statut : '+s);
}
function saveNote(idx, v) {
  leads[idx].note = v;
  saveLeads();
}
function setF(btn, f) {
  activeF = f;
  document.querySelectorAll('.pill').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderLeads();
}

// ===== PANELS =====
function goPanel(name) {
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.bn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('p-'+name).classList.add('on');
  var bn = document.getElementById('bn-'+name);
  if (bn) bn.classList.add('on');
  if (name==='stats') setTimeout(renderStats,50);
  if (name==='notifs') { clearNotifs(); }
}

// ===== EXPORT =====
function exportCSV() {
  var h=['Date','Prenom','Nom','Telephone','Ville','Statut','Note'];
  var r=leads.map(function(l){
    return [l.date,l.prenom,l.nom,l.telephone,l.ville,l.statut,l.note||'']
      .map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  });
  dl('\uFEFF'+h.join(',')+'\n'+r.join('\n'),'leads_'+td()+'.csv','text/csv');
  toast('CSV exporté');
}
function exportJSON() {
  dl(JSON.stringify(leads,null,2),'backup_'+td()+'.json','application/json');
  toast('Sauvegarde créée');
}
function importJSON(input) {
  var f=input.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(Array.isArray(d)){leads=d;saveLeads();renderAll();toast(d.length+' leads importés');}
    }catch(err){toast('Fichier invalide');}
  };
  rd.readAsText(f);
}

// ===== UTILS =====
function pdate(str) {
  if (!str) return null;
  var p=str.split(' ');
  if (p.length<2) return null;
  var d=p[0].split('/');
  var t=p[1].split(':');
  if (d.length<3||t.length<2) return null;
  return new Date(+d[2],+d[1]-1,+d[0],+t[0],+t[1]);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dl(c,n,type){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:type}));a.download=n;a.click();}
function td(){return new Date().toISOString().slice(0,10);}
function mname(i){return['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'][i];}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},2500);
}
</script>
