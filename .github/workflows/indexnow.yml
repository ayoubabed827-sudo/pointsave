name: IndexNow Ping
on:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow Bing (20 grandes villes + homepage)
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host":"www.pointsave.fr","key":"383232b6ca4d41f3a2f03594b4fd5a51","keyLocation":"https://www.pointsave.fr/383232b6ca4d41f3a2f03594b4fd5a51.txt","urlList":["https://www.pointsave.fr/","https://www.pointsave.fr/versailles.html","https://www.pointsave.fr/cergy.html","https://www.pointsave.fr/massy.html","https://www.pointsave.fr/vincennes.html","https://www.pointsave.fr/argenteuil.html","https://www.pointsave.fr/montreuil.html","https://www.pointsave.fr/nanterre.html","https://www.pointsave.fr/creteil.html","https://www.pointsave.fr/boulogne-billancourt.html","https://www.pointsave.fr/saint-denis.html","https://www.pointsave.fr/courbevoie.html","https://www.pointsave.fr/vitry-sur-seine.html","https://www.pointsave.fr/rueil-malmaison.html","https://www.pointsave.fr/champigny-sur-marne.html","https://www.pointsave.fr/colombes.html","https://www.pointsave.fr/asnieres-sur-seine.html","https://www.pointsave.fr/ivry-sur-seine.html","https://www.pointsave.fr/drancy.html","https://www.pointsave.fr/epinay-sur-seine.html","https://www.pointsave.fr/livry-gargan.html"]}' \
            -w "\nHTTP %{http_code}" && echo " ✅ IndexNow OK"

      - name: Ping Google Sitemap
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            "https://www.google.com/ping?sitemap=https%3A%2F%2Fwww.pointsave.fr%2Fsitemap.xml" \
            && echo " ✅ Google sitemap ping OK"

      - name: Ping Bing Sitemap
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            "https://www.bing.com/ping?sitemap=https%3A%2F%2Fwww.pointsave.fr%2Fsitemap.xml" \
            && echo " ✅ Bing sitemap ping OK"
