name: Build commune data files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run build script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ayoubabed827-sudo/pointsave
        run: python3 build_communes.py
