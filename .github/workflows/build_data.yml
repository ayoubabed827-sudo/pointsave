name: Build commune data files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download communes and push via GitHub API (Python)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ayoubabed827-sudo/pointsave
        run: |
          python3 << 'PYEOF'
import json, base64, urllib.request, urllib.parse, re

GH_TOKEN = __import__('os').environ['GH_TOKEN']
GH_REPO = __import__('os').environ['GH_REPO']

def slugify(s):
    s = s.lower()
    s = ''.join(c if c.isascii() else unicodedata.normalize('NFD', c)[0].lower() if c.isalpha() else '-' for c in s)
    import unicodedata
    s = unicodedata.normalize('NFD', s.lower())
    s = ''.join(c for c in s if unicodedata.category(c) != 'Mn')
    s = re.sub(r'[^a-z0-9]+', '-', s).strip('-')
    return s

def gh_get_sha(path):
    url = f'https://api.github.com/repos/{GH_REPO}/contents/{path}'
    req = urllib.request.Request(url, headers={
        'Authorization': f'Bearer {GH_TOKEN}',
        'Accept': 'application/vnd.github.v3+json'
    })
    try:
        with urllib.request.urlopen(req) as r:
            return json.loads(r.read())['sha']
    except:
        return None

def gh_put_file(path, content_str, message):
    sha = gh_get_sha(path)
    content_b64 = base64.b64encode(content_str.encode('utf-8')).decode('ascii')
    body = {'message': message, 'content': content_b64}
    if sha:
        body['sha'] = sha
    data = json.dumps(body).encode('utf-8')
    url = f'https://api.github.com/repos/{GH_REPO}/contents/{path}'
    req = urllib.request.Request(url, data=data, method='PUT', headers={
        'Authorization': f'Bearer {GH_TOKEN}',
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
    })
    with urllib.request.urlopen(req) as r:
        result = json.loads(r.read())
        return result['commit']['sha']

import unicodedata

def slugify(s):
    s = unicodedata.normalize('NFD', s.lower())
    s = ''.join(c for c in s if unicodedata.category(c) != 'Mn')
    s = re.sub(r'[^a-z0-9]+', '-', s).strip('-')
    return s

print('Téléchargement communes françaises...')
url = 'https://geo.api.gouv.fr/communes?fields=nom,codesPostaux,codeDepartement,centre&format=json&geometry=centre'
with urllib.request.urlopen(url) as r:
    communes = json.loads(r.read())
print(f'✅ {len(communes)} communes')

dept_map = {}
index = {}
for c in communes:
    if not c.get('codesPostaux'):
        continue
    dept = c['codeDepartement']
    cp = c['codesPostaux'][0]
    nom = c['nom']
    coords = c.get('centre', {}).get('coordinates', [None, None])
    lon, lat = coords[0], coords[1]
    if dept not in dept_map:
        dept_map[dept] = []
    data = {'nom': nom, 'cp': cp, 'dept': dept, 'lat': lat, 'lon': lon}
    dept_map[dept].append(data)
    slug = slugify(nom)
    if slug:
        index[slug] = data

print(f'📤 Upload {len(dept_map)} fichiers...')
i = 0
for dept, coms in dept_map.items():
    gh_put_file(
        f'public/data/dept-{dept}.json',
        json.dumps(coms, ensure_ascii=False),
        f'data: communes dept-{dept}'
    )
    i += 1
    if i % 10 == 0:
        print(f'  {i}/{len(dept_map)} depts...')

gh_put_file(
    'public/data/index.json',
    json.dumps(index, ensure_ascii=False),
    f'data: index {len(index)} communes'
)

print(f'🎉 {i} fichiers + index ({len(index)} communes) uploadés!')
          PYEOF
