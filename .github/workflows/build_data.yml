name: Build commune data files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Run build script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ayoubabed827-sudo/pointsave
        run: |
          curl -s "https://raw.githubusercontent.com/ayoubabed827-sudo/pointsave/main/build_communes.py" -o build_communes.py
          python3 build_communes.py
