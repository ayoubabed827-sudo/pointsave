name: Build commune data files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download communes and push via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ayoubabed827-sudo/pointsave
        run: |
          node << 'SCRIPT'
          const GH_TOKEN = process.env.GH_TOKEN;
          const GH_REPO = process.env.GH_REPO;

          function slugify(str) {
            return str.toLowerCase()
              .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '');
          }

          async function ghGetSHA(path) {
            const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`, {
              headers: { 'Authorization': `Bearer ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (!r.ok) return null;
            const d = await r.json();
            return d.sha || null;
          }

          async function ghPutFile(path, content, message) {
            const sha = await ghGetSHA(path);
            // Encoder proprement en base64 avec support UTF-8 complet
            const bytes = new TextEncoder().encode(content);
            const binStr = Array.from(bytes).map(b => String.fromCharCode(b)).join('');
            const b64 = btoa(binStr);
            const body = {
              message,
              content: b64,
            };
            if (sha) body.sha = sha;
            const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`, {
              method: 'PUT',
              headers: {
                'Authorization': `Bearer ${GH_TOKEN}`,
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github.v3+json'
              },
              body: JSON.stringify(body)
            });
            const d = await r.json();
            if (!d.commit) throw new Error(`Failed: ${JSON.stringify(d)}`);
            return d.commit.sha;
          }

          async function main() {
            console.log('📥 Téléchargement communes françaises...');
            const r = await fetch(
              'https://geo.api.gouv.fr/communes?fields=nom,codesPostaux,codeDepartement,centre&format=json&geometry=centre'
            );
            const communes = await r.json();
            console.log(`✅ ${communes.length} communes`);

            // Grouper par département
            const deptMap = {};
            const index = {};
            for (const c of communes) {
              if (!c.codesPostaux?.length) continue;
              const dept = c.codeDepartement;
              const cp = c.codesPostaux[0];
              const lat = c.centre?.coordinates?.[1] || null;
              const lon = c.centre?.coordinates?.[0] || null;
              if (!deptMap[dept]) deptMap[dept] = [];
              const data = { nom: c.nom, cp, dept, lat, lon };
              deptMap[dept].push(data);
              const slug = slugify(c.nom);
              if (slug) index[slug] = data;
            }

            console.log(`📤 Upload ${Object.keys(deptMap).length} fichiers via GitHub API...`);

            // Upload chaque dept
            let i = 0;
            for (const [dept, coms] of Object.entries(deptMap)) {
              await ghPutFile(
                `public/data/dept-${dept}.json`,
                JSON.stringify(coms),
                `data: communes dept-${dept}`
              );
              i++;
              if (i % 10 === 0) console.log(`  ${i}/${Object.keys(deptMap).length} depts...`);
            }

            // Upload index
            await ghPutFile(
              'public/data/index.json',
              JSON.stringify(index),
              `data: index ${Object.keys(index).length} communes`
            );

            console.log(`🎉 ${i} fichiers uploadés + index (${Object.keys(index).length} communes)`);
          }

          main().catch(e => { console.error('❌', e.message); process.exit(1); });
          SCRIPT
